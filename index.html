<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rubal Believe Meter</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#ff6a88,#6a11cb,#00c6ff);
background-size:600% 600%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

.container{
width:420px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
color:white;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

h1{
margin-bottom:25px;
}

.meter-box{
margin-top:20px;
}

.bar{
height:28px;
width:100%;
background:rgba(255,255,255,0.3);
border-radius:30px;
overflow:hidden;
}

.fill{
height:100%;
width:50%;
background:linear-gradient(90deg,#00ffcc,#00ff95);
border-radius:30px;
transition:0.6s;
}

.percent{
font-size:35px;
margin-top:15px;
font-weight:bold;
}

.message{
margin-top:10px;
font-size:18px;
}

.slider{
margin-top:25px;
display:none;
}

input{
width:100%;
}

button{
margin-top:25px;
padding:10px 25px;
border:none;
border-radius:10px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.footer{
margin-top:20px;
font-size:13px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h1>Rubal Believe Meter 💙</h1>

<div class="meter-box">

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="percent" id="percent">50%</div>

<div class="message" id="message">
Belief is growing 🌱
</div>

</div>

<div class="slider" id="control">

<input type="range" min="0" max="100" value="50" id="slider">

</div>

<button id="login">Rubal Login</button>

<div class="footer">
Only Rubal can change this belief meter ✨
</div>

</div>

<script>

let fill = document.getElementById("fill")
let percent = document.getElementById("percent")
let slider = document.getElementById("slider")
let message = document.getElementById("message")
let login = document.getElementById("login")
let control = document.getElementById("control")

let belief = localStorage.getItem("belief") || 50

updateMeter(belief)
slider.value = belief

function updateMeter(value){

fill.style.width = value + "%"
percent.innerHTML = value + "%"

localStorage.setItem("belief",value)

if(value < 30){
message.innerHTML = "Trust needs time 💭"
}
else if(value < 70){
message.innerHTML = "Belief is growing 🌱"
}
else if(value < 90){
message.innerHTML = "Strong belief 💖"
}
else{
message.innerHTML = "Maximum belief 🔥"
}

}

slider.oninput = function(){
updateMeter(this.value)
}

login.onclick = function(){

let pass = prompt("Enter Rubal password")

if(pass === "rubal123"){
control.style.display = "block"
alert("Welcome Rubal 💙")
}
else{
alert("Only Rubal can change the meter")
}

}

</script>

</body>
</html>
